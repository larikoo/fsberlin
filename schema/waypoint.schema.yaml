# Waypoint schema for FSBerlin.
# Status: locked (Phase 0, 2026-05-29). See ADR-003.
#
# A waypoint is a card of `type: waypoint` (see card.schema.yaml `type`
# enum). Its descriptor lives at waypoints/<slug>/waypoint.md and therefore
# ALSO carries the universal card fields defined in card.schema.yaml:
#   id, title, type, created (required); plus the shared optionals.
# The fields listed below are the waypoint-SPECIFIC additions layered on
# top of those universal fields — analogous to the work_fields / adr_fields
# / phase_fields sections of card.schema.yaml.
#
# The overlay files inside a waypoint folder (see ADR-003) are a separate
# concern and are NOT governed by this schema; see the note at the bottom.

# === Waypoint-specific fields (layered on the universal card fields) ===
required:
  - slug            # Human-readable folder name. (Also the card's folder.)
  - status          # Enum: planned | active | reached | abandoned

optional:
  - target_date     # ISO 8601 date (aspirational).
  - reached_date    # ISO 8601 date (set when status -> reached).
  - depends_on      # Other waypoint slugs that must be reached first.
  - description
  - success_criteria # List of strings — concrete tests for "reached."

# === Notes ===
# - The overlay files inside a waypoint folder are NOT part of this schema.
#   They are files with the same paths as base files; the schema for each
#   overlay file is the schema for the file it shadows.
# - Invariant-floor files (why.md at root, schema/*) cannot be overlaid.
#   Validators enforce this.
